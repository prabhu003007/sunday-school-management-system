<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADD STUDENT</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
    width:100%;
    min-height:100vh;
overflow-x:hidden;
    background:url("{{ url_for('static', filename='images/general.jpg') }}");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    display:flex;
    justify-content:center;
    align-items:flex-start;

    padding:10px;
}
input{
    width:100%;
    padding:12px 15px;
    background:#000;
    color:#00d9ff;
    border:1px solid #00d9ff;
    font-family:'Orbitron',sans-serif;
    font-size:16px;
    text-transform:uppercase;
    outline:none;
    transition:.3s;
}
input:focus{
    box-shadow:
    0 0 10px #00d9ff,
    0 0 20px rgba(0,217,255,.4);
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron',sans-serif;
}
.title{

    text-align:center;

    color:#00d9ff;

    font-size:24px;
    margin-bottom:15px;

    text-shadow:
    0 0 15px #00d9ff;
}
.panel{
    width:98%;
    max-width:850px;

    padding:15px;

    margin:0;

    background:rgba(0,0,0,.45);

    border:2px solid #00d9ff;

    box-shadow:
    0 0 20px #00d9ff,
    inset 0 0 15px rgba(0,217,255,.2);
}
html,
body{
    margin:0;
    padding:0;
    overflow-x:hidden;
}
.form-group{

    display:flex;

    align-items:center;

    margin-bottom:10px;

    gap:15px;
}
.form-group label{

    width:150px;

    color:#00d9ff;

    font-size:14px;
}
.form-group input,
.form-group textarea,
.form-group select{
    flex:1;
    width:100%;
    background:rgba(0,0,0,.5);
    border:1px solid #00d9ff;
    color:white;
    padding:12px;
    outline:none;
    box-sizing:border-box;
}
select{
    flex:1;
    width:100%;
    padding:12px;
    background:rgba(0,0,0,.5);
    border:1px solid #00d9ff;
    color:#00d9ff;
    font-family:'Orbitron',sans-serif;
    font-size:16px;
    outline:none;
    cursor:pointer;
    appearance:none;
    -webkit-appearance:none;
    -moz-appearance:none;
    box-shadow:none;
}
select option{
    background:#000;
    color:#00d9ff;
}
.form-group input:focus,
.form-group textarea:focus{
    box-shadow:
    0 0 10px #00d9ff;
}
.btn-area{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:15px;
}
.message{
    text-align:center;
    margin-bottom:15px;
    font-size:16px;
    font-weight:bold;
}
.message.success{
    color:#00ff88;
    text-shadow:
    0 0 10px #00ff88;
}
.message.error{
    color:#ff4444;
    text-shadow:
    0 0 10px #ff4444;
}
.btn{
    padding:14px 30px;
    border:2px solid #00d9ff;
    background:transparent;
    color:#00d9ff;
    cursor:pointer;
    transition:.3s;
}
.btn:hover{
    background:#00d9ff;
    color:black;
    box-shadow:
    0 0 20px #00d9ff;
}

@media(max-width:768px){

    body{
        padding:0;
        align-items:flex-start;
    }

    .panel{
        width:100%;
        max-width:none;
        margin:0;
        padding:12px;

        border-radius:0;

        box-shadow:
        0 0 15px #00d9ff,
        inset 0 0 10px rgba(0,217,255,.2);
    }

    .title{
        font-size:22px;
        margin-bottom:20px;
    }

    .form-group{
        flex-direction:column;
        align-items:flex-start;
        gap:4px;
        margin-bottom:12px;
    }

    .form-group label{
        width:100%;
        font-size:11px;
        margin-bottom:2px;
    }

    .form-group input,
    .form-group select{
        width:100%;
        height:42px;
        padding:8px 10px;
        font-size:14px;
    }

    .btn-area,
    .button-area{
        flex-direction:column;
        gap:10px;
    }

    .btn{
        width:100%;
        height:42px;
        padding:0;
        font-size:14px;
    }
}</style>

</head>

<body>

<div class="panel">
    <h1 class="title">
        ADD NEW STUDENT
    </h1>

{% if message %}
<div class="message {{ msg_type }}">
    {{ message }}
</div>
{% endif %}

    <form method="POST">

        <div class="form-group">
            <label>NAME</label>
            <input type="text" id="name" placeholder="ENTER NAME" name="name" required>
        </div>

<div class="form-group">
<label>LAST NAME</label>
    <input
    type="text"
    id="last_name"
    name="last_name"
    placeholder="ENTER LAST NAME">
</div>

        <div class="form-group">
    <label>DOB</label>
<input
type="date"
id="dob"
name="dob">
</div>

        <div class="form-group">
    <label>AGE</label>
<input
type="number"
id="age"
name="age"
readonly>
</div>

<div class="form-group">
    <label>GENDER</label>
    <select
    id="gender"
    name="gender"
    required>
        <option value="">
            
        </option>
        <option value="MALE">
            MALE
        </option>
        <option value="FEMALE">
            FEMALE
        </option>
    </select>
</div>

<div class="form-group">
<label>CLASS </label>
        <select id="std" name="std" required>
    <option value="">
            </option>
    {% for i in range(1,12) %}
    <option value="{{ i }}">
        {{ i }} STD
    </option>
    {% endfor %}
</select>
        </div>
                   <div class="form-group">
           <label>BRANCH</label>
<select name="place" required>
<option value="">
</option>
{% for branch in branches %}
<option value="{{ branch.branch_name }}">
{{ branch.branch_name }}
</option>
{% endfor %}
</select>
</div>
<div class="form-group">
    <label>PARENT NAME</label>
    <input
    type="text"
    id="parent_name"
    name="parent_name"
   >
</div>

        <div class="form-group">
            <label>DATE OF ADMISSION</label>
            <input type="date" id="admission_date" name="admission_date" >
        </div>

<div class="form-group">
<label>CLASS OF ADMISSION</label>
        <select
id="admission_class"
name="admission_class"
>
    <option value="">
            </option>
    {% for i in range(1,12) %}
    <option value="{{ i }}">
        {{ i }} STD
    </option>
    {% endfor %}
</select>
</div>        

        <div class="btn-area">
            <button type="submit" class="btn">
                SAVE STUDENT
            </button>
            <button
                type="button"
                class="btn"
                onclick="window.location.href='/options'">
                BACK
            </button>
        </div>

    </form>
</div>

<script>

/* AUTO UPPERCASE */
document
.querySelectorAll('input[type="text"]')
.forEach(field => {
    field.addEventListener(
    "input",
    function(){
        this.value =
        this.value.toUpperCase();
    });
});

/* DOB + AGE CALCULATION */
const today =
new Date().toISOString().split("T")[0];
document
.getElementById("dob")
.setAttribute("max", today);
document
.getElementById("dob")
.addEventListener(
"change",
function(){
    const dob =
    new Date(this.value);
    const today =
    new Date();
    if(dob > today){
        alert(
        "DATE OF BIRTH CANNOT BE GREATER THAN TODAY"
        );
        this.value = "";
        document
        .getElementById("age")
        .value = "";
        return;
    }
    let age =
    today.getFullYear()
    - dob.getFullYear();
    const month =
    today.getMonth()
    - dob.getMonth();
    if(
        month < 0 ||
        (
            month === 0 &&
            today.getDate() < dob.getDate()
        )
    ){
        age--;
    }
    document
    .getElementById("age")
    .value = age;
});

document
.querySelector("form")
.addEventListener(
"submit",
function(e){
    const dob =
    document.getElementById("dob").value;
    const admissionDate =
    document.getElementById("admission_date").value;
    const std =
    parseInt(
        document.getElementById("std").value
    );
    const admissionClass =
    parseInt(
        document.getElementById("admission_class").value
    );
    const today =
    new Date();
    /* ADMISSION DATE > DOB */
    if(
        dob &&
        admissionDate &&
        new Date(admissionDate) < new Date(dob)
    ){
        alert(
        "ADMISSION DATE CANNOT BE EARLIER THAN DATE OF BIRTH"
        );
        e.preventDefault();
        return;
    }
    /* ADMISSION DATE <= TODAY */
    if(
        admissionDate &&
        new Date(admissionDate) > today
    ){
        alert(
        "ADMISSION DATE CANNOT BE GREATER THAN TODAY"
        );
        e.preventDefault();
        return;
    }
    /* ADMISSION CLASS <= CURRENT CLASS */
    if(
        !isNaN(std) &&
        !isNaN(admissionClass) &&
        admissionClass > std
    ){
        alert(
        "CLASS OF ADMISSION CANNOT BE GREATER THAN CURRENT CLASS"
        );
        e.preventDefault();
        return;
    }
});

const fields = Array.from(
document.querySelectorAll(
'input, select, textarea'
)
);
fields.forEach((field,index)=>{
    field.addEventListener(
    'keydown',
    function(e){
        if(e.key === 'Enter'){
            e.preventDefault();
            const nextField =
            fields[index + 1];
            if(nextField){
                nextField.focus();
                if(
                typeof nextField.select
                === 'function'
                ){
                    nextField.select();
                }
            }
        }
    });
});

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STRANGER OPTIONS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron',sans-serif;
}

body{

    width:100%;
    height:100vh;

    background:url("{{ url_for('static', filename='images/options.jpg') }}");

    background-size:cover;
    background-position:center;

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{

    position:absolute;
    inset:0;

    background:rgba(0,0,0,.55);
}

.container{

    position:relative;

    z-index:10;

    width:90%;

    display:flex;

    justify-content:space-between;

    align-items:center;
}
.left-buttons,
.right-buttons{

    display:flex;

    flex-direction:column;

    gap:35px;
}

@media(max-width:768px){

body{
        background:url("{{ url_for('static', filename='images/options_mobile.png') }}");
        background-size:cover;
        background-position:center center;
        background-repeat:no-repeat;
    }

    .container{

        flex-direction:column;

        gap:30px;
    }

    .left-buttons,
    .right-buttons{

        width:100%;

        align-items:center;
    }

}
/* HUD BUTTON */

.hud-btn{

cursor:pointer;

outline:none;

font-family:'Orbitron',sans-serif;

    position:relative;

    width:340px;

    padding:22px;

    text-align:center;

    color:#FFD700;

    text-decoration:none;

    font-size:20px;

    letter-spacing:2px;

    background:rgba(0,0,0,.35);

    border:2px solid #FFD700;

    clip-path:polygon(
    12% 0%,
    100% 0%,
    100% 70%,
    88% 100%,
    0% 100%,
    0% 30%
    );

    transition:.4s;

    box-shadow:
    0 0 10px #FFD700,
    inset 0 0 10px rgba(0,217,255,.3);
}

button.hud-btn{
    appearance:none;
    -webkit-appearance:none;
}
/* Animated Shine */

.hud-btn::before{

    content:"";

    position:absolute;

    top:0;
    left:-120%;

    width:60%;
    height:100%;

    background:
    linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.4),
    transparent);

    transition:.7s;
}

.hud-btn:hover::before{

    left:140%;
}

.hud-btn:hover{

    transform:scale(1.05);

    color:white;

    box-shadow:
    0 0 20px #FFD700,
    0 0 40px #FFD700,
    inset 0 0 20px rgba(0,217,255,.5);
}

/* MOBILE */

@media(max-width:768px){

    .hud-btn{

        width:280px;

        font-size:16px;
    }
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

    <div class="left-buttons">

        <button class="hud-btn" onclick="goAddPerson()">
            ADD NEW STUDENT
        </button>

        <button class="hud-btn" onclick="goSearchPerson()">
            SEARCH STUDENT
        </button>

        <button class="hud-btn" onclick="goViewPersons()">
            VIEW ALL STUDENTS
        </button>

    </div>

    <div class="right-buttons">

        <button
        class="hud-btn"
        onclick="window.location.href='/attendance_marks'">

            ATTENDANCE & MARKS

        </button>

        <button
        class="hud-btn"
        onclick="goSettings()">

            SETTINGS

        </button>

        <button
        class="hud-btn"
        onclick="goBack()">

            BACK

        </button>

    </div>

</div>
<script>

function goAddPerson(){
    window.location.href="/add_student";
}

function goSearchPerson(){
    window.location.href="/search_student";
}

function goViewPersons(){
    window.location.href="/view_students";
}

function goSettings(){
    window.location.href="/settings";
}


function goBack(){
    window.location.href="/";
}

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNDAY SCHOOL SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron',sans-serif;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    position:relative;
    background:url("{{ url_for('static', filename='images/index.png') }}");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.25);
    z-index:1;
}

.clock{
    position:absolute;
    top:25px;
    right:25px;
    z-index:100;
    padding:18px 25px;
    color:#FFD700;
    border:2px solid #FFD700;
    background:rgba(0,0,0,.45);
}

.container{
    position:relative;
    z-index:10;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.main-title{
    font-family:'Cinzel',serif;
    font-size:75px;
    font-weight:800;
    color:white;
    text-align:center;
    line-height:1.2;
    text-shadow:
    0 0 10px rgba(0,0,0,.9),
    0 0 20px rgba(0,0,0,.8);
}

.online{
    color:white;
    font-size:24px;
    font-weight:bold;
    letter-spacing:8px;
    margin-top:15px;
    margin-bottom:40px;
    text-align:center;
}

#enterBtn{
    padding:16px 45px;
    border:2px solid #FFD700;
    background:rgba(0,0,0,.5);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

#enterBtn:hover{
    background:#FFD700;
    color:black;
}

@media(max-width:768px){
    .main-title{
        font-size:42px;
    }

    .online{
        font-size:14px;
        letter-spacing:3px;
    }
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="clock" id="clock"></div>

<div class="container">

    <div class="main-title">
        THE PENTECOSTAL<br>
        MISSION
    </div>

    <div class="online">
        SUNDAY SCHOOL MANAGEMENT SYSTEM
    </div>

    <button id="enterBtn">
        GO TO OPTIONS
    </button>

</div>

<script>

function updateClock(){

    document.getElementById("clock").innerHTML =
    new Date().toLocaleTimeString();

}

setInterval(updateClock,1000);
updateClock();

document.getElementById("enterBtn")
.addEventListener("click",function(){

    window.location.href="/options";

});

</script>

</body>
</html>

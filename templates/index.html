<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNDAY SCHOOL SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron',sans-serif;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;
    position:relative;
    background:url("{{ url_for('static', filename='images/index.png') }}");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.25);
    z-index:1;
}

.clock{
    position:absolute;

    bottom:20px;
    right:20px;

    z-index:100;

    padding:15px 25px;

    min-width:220px;

    text-align:center;

    font-size:28px;
    font-weight:bold;

    color:#ffffff;

    background:rgba(0,0,0,.55);

    border:1px solid rgba(255,255,255,.3);

    border-radius:20px;

    backdrop-filter:blur(8px);

    box-shadow:
    0 0 20px rgba(255,255,255,.2);

    text-shadow:
    0 0 10px rgba(255,255,255,.8);
}
.container{
    position:relative;
    z-index:10;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.main-title{
    font-family:'Cinzel',serif;
    font-size:75px;
    font-weight:800;
    color:white;
    text-align:center;
    line-height:1.2;
    text-shadow:
    0 0 10px rgba(0,0,0,.9),
    0 0 20px rgba(0,0,0,.8);
}

.online{
    position:absolute;
    top:270px;

    width:100%;

    text-align:center;

    color:#ffffff;

    font-size:26px;

    font-weight:600;

    letter-spacing:6px;

    text-shadow:
    0 0 15px rgba(0,0,0,.9),
    0 0 30px rgba(0,0,0,.8);

    z-index:20;
}
#enterBtn{
    padding:16px 45px;
    border:2px solid #FFD700;
    background:rgba(0,0,0,.5);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

#enterBtn:hover{
    background:#FFD700;
    color:black;
}

@media(max-width:768px){

    .main-title{
        font-size:34px !important;
        line-height:1.05;
    }

    .online{
        font-size:11px !important;
        letter-spacing:2px;
    }

    #enterBtn{
        width:220px;
        padding:12px 20px;
        font-size:14px;
        margin-top:20px;
    }

    .clock{
        bottom:15px;
        right:15px;
        min-width:120px;
        padding:8px 12px;
        font-size:14px;
    }
@media(max-width:768px){

    body{
        background:url("{{ url_for('static', filename='images/index_mobile.png') }}");
        background-size:cover;
        background-position:center center;
        background-repeat:no-repeat;
    }

.clock{
    top:10px;
    right:10px;
    bottom:auto;
    left:auto;

    font-size:14px;
    padding:8px 12px;
}

#enterBtn{
    margin-top:0;

    position:absolute;
    top:60px;   /* adjust if needed */

    left:50%;
    transform:translateX(-50%);
}
.main-title{
    position:absolute;
    top:70px;

    width:100%;

    text-align:center;

    font-family:'Cinzel',serif;
    font-size:85px;
    font-weight:800;

    color:#ffffff;

    letter-spacing:3px;

    text-shadow:
    0 0 10px rgba(0,0,0,.9),
    0 0 20px rgba(0,0,0,.9),
    0 0 40px rgba(0,0,0,.8);

    z-index:20;
}
.online{
    position:absolute;
    top:270px;

    width:100%;

    text-align:center;

    color:#FFD700;

    font-size:24px;

    letter-spacing:8px;

    text-shadow:
    0 0 10px rgba(0,0,0,.8);

    z-index:20;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="clock" id="clock"></div>

<div class="container">

    <div class="main-title">
        THE PENTECOSTAL<br>
        MISSION
    </div>

    <div class="online">
        SUNDAY SCHOOL MANAGEMENT SYSTEM
    </div>

    <button id="enterBtn">
        GO TO OPTIONS
    </button>

</div>

<script>

function updateClock(){

const now = new Date();

document.getElementById("clock").innerHTML =
now.toLocaleTimeString() +
"<br><span style='font-size:12px;color:#dcdcdc;'>"+
now.toLocaleDateString()+
"</span>";

}
setInterval(updateClock,1000);
updateClock();

document.getElementById("enterBtn")
.addEventListener("click",function(){

    window.location.href="/options";

});

</script>

</body>
</html>

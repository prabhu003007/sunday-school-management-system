<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHANGE ACCESS CODE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{

height:100vh;

background:url("{{ url_for('static', filename='images/change_password.jpg') }}");

background-size:cover;
background-repeat:no-repeat;
background-position:center;

display:flex;
justify-content:center;
align-items:center;
}

.overlay{

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.20);
}

.panel{

position:relative;

z-index:10;

width:90%;
max-width:700px;

padding:40px;

background:rgba(0,0,0,.25);

border:2px solid #00d9ff;

box-shadow:
0 0 20px #00d9ff,
inset 0 0 20px rgba(0,217,255,.15);
}

.title{

text-align:center;

color:#00d9ff;

font-size:28px;

margin-bottom:30px;

text-shadow:
0 0 15px #00d9ff;
}

.form-group{

margin-bottom:20px;
}

label{

display:block;

margin-bottom:8px;

color:#00d9ff;
}

input{

width:100%;

padding:14px;

background:#000;

border:1px solid #00d9ff;

color:white;

outline:none;
}

input:focus{

box-shadow:
0 0 10px #00d9ff;
}

.message{

text-align:center;

margin-bottom:20px;

font-size:14px;

color:{{ color }};
}

.buttons{

display:flex;

justify-content:center;

gap:20px;

margin-top:25px;
}

.btn{

padding:14px 30px;

background:transparent;

border:2px solid #00d9ff;

color:#00d9ff;

cursor:pointer;

transition:.3s;
}

.btn:hover{

background:#00d9ff;

color:black;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="panel">

<h1 class="title">
CHANGE ACCESS CODE
</h1>

<div class="message">
{{ message }}
</div>

<form method="POST">

<div class="form-group">

<label>CURRENT ACCESS CODE</label>

<input
type="password"
name="current_password"
required>

</div>

<div class="form-group">

<label>NEW ACCESS CODE</label>

<input
type="password"
name="new_password"
required>

</div>

<div class="form-group">

<label>CONFIRM ACCESS CODE</label>

<input
type="password"
name="confirm_password"
required>

</div>

<div class="buttons">

<button
type="submit"
class="btn">

UPDATE CODE

</button>

<button
type="button"
class="btn"
onclick="window.location.href='/settings'">

BACK

</button>

</div>

</form>

</div>

</body>
</html>
